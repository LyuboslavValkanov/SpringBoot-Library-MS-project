<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>Categories</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* Navbar */
     .navbar {
         background: linear-gradient(90deg, #0d6efd, #0a58ca);
     }

     .navbar .nav-link,
     .navbar .navbar-brand {
         color: white !important;
     }

     .navbar .nav-link:hover {
         color: #ffc107 !important;
     }
      /* Thicker table borders */
.table,
.table th,
.table td {
    border: 2px solid #000; /* thick black borders */
}

.table {
    border-collapse: collapse; /* keeps rounded corners if needed */
    border-radius: 8px;        /* optional slight rounding */
}
    /* Force desktop-like layout on mobile */
        body {
            min-width: 1200px;       /* match your desktop width */
            max-width: 1200px;
            overflow-x: auto;        /* allow horizontal scrolling */
        }

        .container, .card, .card-body {
            min-width: 1200px;       /* prevent shrinking */
        }

        /* Optional: keep fonts same as desktop */
        body, p, h1, h2, h3, h4, h5, h6 {
            font-size: 16px;
        }
  </style>

</head>
<body>
<div th:insert="/fragments/header :: header"></div>
<div class="container my-2">
  <div class="card">
    <div class="card-body">
      <div th:switch="${categories}" class="container my-5">
        <p class="my-5">
          <a href="/add-category" class="btn btn-primary">
            <i class="fas fa-user-plus ml-2">Add Category</i></a>
        </p>

        <div class="col-md-12">
          <h2 th:case="null">No record found !</h2>
          <div th:case="*">
            <table class="table table-striped table-responsive-md">
              <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Name</th>
                <th scope="col">Edit</th>
                <th scope="col">Delete</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="category: ${categories}" >
                <td th:text="${category.id}"></td>
                <td th:text="${category.name}"></td>
                <td><a th:href="@{/update-category/{id}(id=${category.id})}" class="btn btn-primary"><i
                        class="fas fa-eye ml-2"></i></a></td>
                <td><a th:href="@{/remove-category/{id}(id=${category.id})}" class="btn btn-primary"><i
                        class="fas fa-eye ml-2"></i></a></td>

              </tr>
              </tbody>

            </table>

          </div>

        </div>


      </div>
    </div>

  </div>

</div>

</body>
</html>
