<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge" >
    <title>Update Book</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Navbar */
     .navbar {
         background: linear-gradient(90deg, #0d6efd, #0a58ca);
     }

     .navbar .nav-link,
     .navbar .navbar-brand {
         color: white !important;
     }

     .navbar .nav-link:hover {
         color: #ffc107 !important;
     }
    </style>
</head>
<body>
<div th:insert="/fragments/header :: header"></div>
<div class="container my-2">
    <div class="card">
        <div class="card-body">
            <form action="#" th:action="@{/save-update/{id}(id=${book.id})}" th:object="${book}" method="post">
                <div class="row">
                    <div class="form-group col-md-8">
                        <label for="name" class="col-form-label fw-bold">ISBN</label>
                        <input type="text" th:field="*{isbn}" class="form-control" id="isbn" placeholder="Enter ISBN"/>

                    </div>

                    <div class="form-group col-md-8">
                        <label for="name" class="col-form-label fw-bold">Book Name</label>
                        <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Enter Book Name"/>

                    </div>

                    <div class="form-group col-md-8">
                        <label for="name" class="col-form-label fw-bold">Book Description</label>
                        <input type="text" th:field="*{description}" class="form-control" id="description" placeholder="Enter Book Description"/>

                    </div>

                    <div class="form-group col-md-8">
                        <label for="categories" class="col-form-label fw-bold">Category</label>
                        <select th:field="*{categories}" class="form-control">
                            <option th:each="category: ${categories}" th:value="${category.id}"
                            th:text="${category.name}"></option>
                        </select>
                    </div>

                    <div class="form-group col-md-8">
                        <label for="author" class="col-form-label fw-bold">Author</label>
                        <select th:field="*{authors}" class="form-control">
                            <option th:each="author: ${authors}" th:value="${author.id}"
                                    th:text="${author.name}"></option>
                        </select>
                    </div>

                    <div class="form-group col-md-8">
                        <label for="publisher" class="col-form-label fw-bold">Publisher</label>
                        <select th:field="*{publishers}" class="form-control">
                            <option th:each="publisher: ${publishers}" th:value="${publisher.id}"
                                    th:text="${publisher.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <input type="submit" class="btn btn-primary" value="Submit">
                    </div>

                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
